services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "Mystrongpassword0"
    ports:
      - "1433:1433"
    volumes:
      - mssqldata:/var/opt/mssql

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "5149:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Server=db,1433;Database=Lexicon;User Id=sa;Password=Mystrongpassword0;TrustServerCertificate=True
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    
volumes:
  mssqldata: